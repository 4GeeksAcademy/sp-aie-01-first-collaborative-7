<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marea | Carrito</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="cart-page">
    <header class="hero">
      <p class="eyebrow">Marea</p>
      <h1>Tu carrito de compras</h1>
      <p class="subtitle">Revisa tus productos y finaliza tu pedido en segundos.</p>
    </header>

    <section class="cart-layout" aria-label="Contenido del carrito">
      <section class="products-panel" aria-label="Lista de productos">
        <div class="panel-header">
          <h2>Productos</h2>
          <p id="items-count" aria-live="polite">0 productos</p>
        </div>

        <div id="cart-items" class="cart-items"></div>

        <p id="empty-cart-message" class="empty-cart hidden" role="status" aria-live="polite">
          Tu carrito está vacío.
        </p>
      </section>

      <aside class="summary-panel" aria-label="Resumen de compra">
        <h2>Resumen</h2>

        <div class="summary-row">
          <span>Subtotal</span>
          <strong id="subtotal">$0.00</strong>
        </div>
        <div class="summary-row">
          <span>Impuestos (21%)</span>
          <strong id="taxes">$0.00</strong>
        </div>

        <hr>

        <div class="summary-row total-row">
          <span>Total</span>
          <strong id="total">$0.00</strong>
        </div>

        <button id="checkout-button" class="checkout-button" type="button">
          Comprar
        </button>
      </aside>
    </section>
  </main>

  <template id="cart-item-template">
    <article class="cart-item">
      <img class="item-image" src="" alt="">

      <div class="item-info">
        <h3 class="item-name"></h3>
        <p class="item-unit-price"></p>
      </div>

      <div class="item-quantity" aria-label="Selector de cantidad">
        <button class="qty-btn minus" type="button" aria-label="Disminuir cantidad">-</button>
        <input class="qty-input" type="number" min="1" step="1" value="1" aria-label="Cantidad del producto">
        <button class="qty-btn plus" type="button" aria-label="Aumentar cantidad">+</button>
      </div>

      <p class="item-total" aria-label="Total del producto"></p>

      <button class="remove-btn" type="button" aria-label="Eliminar producto">Eliminar</button>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
