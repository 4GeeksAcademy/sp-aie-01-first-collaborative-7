<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marea | Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="m-0 min-h-screen bg-[radial-gradient(circle_at_12%_12%,rgba(255,213,194,0.78),rgba(255,213,194,0)_44%),radial-gradient(circle_at_86%_16%,rgba(88,139,139,0.28),rgba(88,139,139,0)_40%),linear-gradient(160deg,#ffffff_0%,#f8fbfa_44%,#f4f7f6_100%)] font-[Arial,sans-serif] text-[#1f3640]">
    <main class="mx-auto grid max-w-[1080px] gap-5 px-4 py-8 min-[840px]:grid-cols-[minmax(0,1fr)_320px] min-[840px]:p-[2.2rem]" aria-labelledby="checkout-title">
      <section class="order-2 rounded-2xl border border-[rgba(88,139,139,0.2)] bg-[rgba(255,255,255,0.88)] p-5 shadow-[0_14px_34px_rgba(31,54,64,0.1)] backdrop-blur-[3px] min-[840px]:order-1">
        <header class="checkout-header">
          <p class="brand m-0 font-bold uppercase tracking-[0.1rem] text-[#e1a38c]">Marea</p>
          <h1 id="checkout-title" class="m-0 mt-1 mb-2 tracking-[0.2px]">Formulario de pago</h1>
          <p class="step-meta m-0 text-[#667f89]" id="stepMeta">Paso 1 de 3</p>

          <div class="progress mt-4" role="progressbar" aria-valuemin="1" aria-valuemax="3" aria-valuenow="1" aria-label="Progreso del checkout">
            <div class="progress-track h-2 w-full overflow-hidden rounded-full bg-[#dfebea]">
              <div class="progress-fill h-full w-1/3 rounded-full bg-gradient-to-r from-[#ffd5c2] to-[#588b8b] transition-[width] duration-300 ease-out" id="progressFill"></div>
            </div>
            <ol class="progress-steps mt-2.5 flex list-none justify-between p-0" aria-hidden="true">
              <li class="active grid h-[1.8rem] w-[1.8rem] place-items-center rounded-full border border-[rgba(88,139,139,0.35)] text-[#5f7781] [&.active]:border-transparent [&.active]:bg-[#588b8b] [&.active]:font-bold [&.active]:text-white">1</li>
              <li class="grid h-[1.8rem] w-[1.8rem] place-items-center rounded-full border border-[rgba(88,139,139,0.35)] text-[#5f7781] [&.active]:border-transparent [&.active]:bg-[#588b8b] [&.active]:font-bold [&.active]:text-white">2</li>
              <li class="grid h-[1.8rem] w-[1.8rem] place-items-center rounded-full border border-[rgba(88,139,139,0.35)] text-[#5f7781] [&.active]:border-transparent [&.active]:bg-[#588b8b] [&.active]:font-bold [&.active]:text-white">3</li>
            </ol>
          </div>
        </header>

        <form id="checkoutForm" class="mt-4" novalidate>
          <section class="step active translate-y-0 opacity-100 transition-all duration-300" data-step="1" aria-labelledby="step1-title">
            <h2 id="step1-title" class="mt-0 mb-4">Datos personales</h2>

            <label for="fullName" class="my-0 block mt-2 text-[0.95rem] text-[#667f89]">Nombre completo</label>
            <input id="fullName" class="w-full rounded-[10px] border border-[rgba(88,139,139,0.23)] bg-white px-3 py-3 text-[#1f3640] outline-none transition duration-200 focus:border-[#588b8b] focus:shadow-[0_0_0_3px_rgba(88,139,139,0.18)] [&.is-error]:border-[#d86f6f] [&.is-valid]:border-[#9de1d5]" name="fullName" type="text" autocomplete="name" required />
            <p class="field-error mt-1 min-h-4 text-[0.8rem] text-[#d86f6f]" data-error-for="fullName"></p>

            <label for="email" class="my-0 block mt-2 text-[0.95rem] text-[#667f89]">Correo electronico</label>
            <input id="email" class="w-full rounded-[10px] border border-[rgba(88,139,139,0.23)] bg-white px-3 py-3 text-[#1f3640] outline-none transition duration-200 focus:border-[#588b8b] focus:shadow-[0_0_0_3px_rgba(88,139,139,0.18)] [&.is-error]:border-[#d86f6f] [&.is-valid]:border-[#9de1d5]" name="email" type="email" autocomplete="email" required />
            <p class="field-error mt-1 min-h-4 text-[0.8rem] text-[#d86f6f]" data-error-for="email"></p>

            <label for="phone" class="my-0 block mt-2 text-[0.95rem] text-[#667f89]">Telefono</label>
            <input id="phone" class="w-full rounded-[10px] border border-[rgba(88,139,139,0.23)] bg-white px-3 py-3 text-[#1f3640] outline-none transition duration-200 focus:border-[#588b8b] focus:shadow-[0_0_0_3px_rgba(88,139,139,0.18)] [&.is-error]:border-[#d86f6f] [&.is-valid]:border-[#9de1d5]" name="phone" type="tel" autocomplete="tel" inputmode="tel" required />
            <p class="field-error mt-1 min-h-4 text-[0.8rem] text-[#d86f6f]" data-error-for="phone"></p>
          </section>

          <section class="step translate-y-0 opacity-100 transition-all duration-300" data-step="2" aria-labelledby="step2-title" hidden>
            <h2 id="step2-title" class="mt-0 mb-4">Direccion de entrega</h2>

            <label for="address" class="my-0 block mt-2 text-[0.95rem] text-[#667f89]">Direccion (calle y numero)</label>
            <input id="address" class="w-full rounded-[10px] border border-[rgba(88,139,139,0.23)] bg-white px-3 py-3 text-[#1f3640] outline-none transition duration-200 focus:border-[#588b8b] focus:shadow-[0_0_0_3px_rgba(88,139,139,0.18)] [&.is-error]:border-[#d86f6f] [&.is-valid]:border-[#9de1d5]" name="address" type="text" autocomplete="street-address" required />
            <p class="field-error mt-1 min-h-4 text-[0.8rem] text-[#d86f6f]" data-error-for="address"></p>

            <div class="field-row grid grid-cols-1 gap-3 min-[840px]:grid-cols-2">
              <div>
                <label for="city" class="my-0 block mt-2 text-[0.95rem] text-[#667f89]">Ciudad</label>
                <input id="city" class="w-full rounded-[10px] border border-[rgba(88,139,139,0.23)] bg-white px-3 py-3 text-[#1f3640] outline-none transition duration-200 focus:border-[#588b8b] focus:shadow-[0_0_0_3px_rgba(88,139,139,0.18)] [&.is-error]:border-[#d86f6f] [&.is-valid]:border-[#9de1d5]" name="city" type="text" autocomplete="address-level2" required />
                <p class="field-error mt-1 min-h-4 text-[0.8rem] text-[#d86f6f]" data-error-for="city"></p>
              </div>
              <div>
                <label for="postalCode" class="my-0 block mt-2 text-[0.95rem] text-[#667f89]">Codigo postal</label>
                <input id="postalCode" class="w-full rounded-[10px] border border-[rgba(88,139,139,0.23)] bg-white px-3 py-3 text-[#1f3640] outline-none transition duration-200 focus:border-[#588b8b] focus:shadow-[0_0_0_3px_rgba(88,139,139,0.18)] [&.is-error]:border-[#d86f6f] [&.is-valid]:border-[#9de1d5]" name="postalCode" type="text" autocomplete="postal-code" required />
                <p class="field-error mt-1 min-h-4 text-[0.8rem] text-[#d86f6f]" data-error-for="postalCode"></p>
              </div>
            </div>

            <label for="country" class="my-0 block mt-2 text-[0.95rem] text-[#667f89]">Pais</label>
            <input id="country" class="w-full rounded-[10px] border border-[rgba(88,139,139,0.23)] bg-white px-3 py-3 text-[#1f3640] outline-none transition duration-200 focus:border-[#588b8b] focus:shadow-[0_0_0_3px_rgba(88,139,139,0.18)] [&.is-error]:border-[#d86f6f] [&.is-valid]:border-[#9de1d5]" name="country" type="text" autocomplete="country-name" required />
            <p class="field-error mt-1 min-h-4 text-[0.8rem] text-[#d86f6f]" data-error-for="country"></p>
          </section>

          <section class="step translate-y-0 opacity-100 transition-all duration-300" data-step="3" aria-labelledby="step3-title" hidden>
            <h2 id="step3-title" class="mt-0 mb-4">Pago con tarjeta</h2>

            <label for="cardNumber" class="my-0 block mt-2 text-[0.95rem] text-[#667f89]">Numero de tarjeta</label>
            <input id="cardNumber" class="w-full rounded-[10px] border border-[rgba(88,139,139,0.23)] bg-white px-3 py-3 text-[#1f3640] outline-none transition duration-200 focus:border-[#588b8b] focus:shadow-[0_0_0_3px_rgba(88,139,139,0.18)] [&.is-error]:border-[#d86f6f] [&.is-valid]:border-[#9de1d5]" name="cardNumber" type="text" inputmode="numeric" maxlength="19" placeholder="1234 5678 9012 3456" autocomplete="cc-number" required />
            <p class="field-error mt-1 min-h-4 text-[0.8rem] text-[#d86f6f]" data-error-for="cardNumber"></p>

            <label for="cardHolder" class="my-0 block mt-2 text-[0.95rem] text-[#667f89]">Nombre del titular</label>
            <input id="cardHolder" class="w-full rounded-[10px] border border-[rgba(88,139,139,0.23)] bg-white px-3 py-3 text-[#1f3640] outline-none transition duration-200 focus:border-[#588b8b] focus:shadow-[0_0_0_3px_rgba(88,139,139,0.18)] [&.is-error]:border-[#d86f6f] [&.is-valid]:border-[#9de1d5]" name="cardHolder" type="text" autocomplete="cc-name" required />
            <p class="field-error mt-1 min-h-4 text-[0.8rem] text-[#d86f6f]" data-error-for="cardHolder"></p>

            <div class="field-row grid grid-cols-1 gap-3 min-[840px]:grid-cols-2">
              <div>
                <label for="cardExpiry" class="my-0 block mt-2 text-[0.95rem] text-[#667f89]">Fecha de expiracion</label>
                <input id="cardExpiry" class="w-full rounded-[10px] border border-[rgba(88,139,139,0.23)] bg-white px-3 py-3 text-[#1f3640] outline-none transition duration-200 focus:border-[#588b8b] focus:shadow-[0_0_0_3px_rgba(88,139,139,0.18)] [&.is-error]:border-[#d86f6f] [&.is-valid]:border-[#9de1d5]" name="cardExpiry" type="text" inputmode="numeric" maxlength="5" placeholder="MM/AA" autocomplete="cc-exp" required />
                <p class="field-error mt-1 min-h-4 text-[0.8rem] text-[#d86f6f]" data-error-for="cardExpiry"></p>
              </div>
              <div>
                <label for="cardCvv" class="my-0 block mt-2 text-[0.95rem] text-[#667f89]">CVV</label>
                <input id="cardCvv" class="w-full rounded-[10px] border border-[rgba(88,139,139,0.23)] bg-white px-3 py-3 text-[#1f3640] outline-none transition duration-200 focus:border-[#588b8b] focus:shadow-[0_0_0_3px_rgba(88,139,139,0.18)] [&.is-error]:border-[#d86f6f] [&.is-valid]:border-[#9de1d5]" name="cardCvv" type="password" inputmode="numeric" maxlength="4" autocomplete="cc-csc" required />
                <p class="field-error mt-1 min-h-4 text-[0.8rem] text-[#d86f6f]" data-error-for="cardCvv"></p>
              </div>
            </div>

            <p class="security-note mt-4 rounded-lg border-l-4 border-[#588b8b] bg-[rgba(88,139,139,0.1)] px-3 py-3 text-[#36545f]" aria-live="polite">
              <span class="lock-icon mr-1.5" aria-hidden="true">&#128274;</span>
              Candado seguro. Tus datos viajan cifrados de extremo a extremo.
            </p>
          </section>

          <div class="actions mt-2 flex justify-between gap-3">
            <button type="button" id="backBtn" class="btn btn-ghost rounded-[10px] border border-[rgba(88,139,139,0.35)] bg-white px-4 py-3 text-[0.95rem] font-bold text-[#45626d] transition duration-200 hover:-translate-y-px hover:brightness-105 disabled:cursor-not-allowed disabled:opacity-45" disabled>Volver</button>
            <button type="button" id="nextBtn" class="btn btn-primary rounded-[10px] border-0 bg-[#588b8b] px-4 py-3 text-[0.95rem] font-bold text-white transition duration-200 hover:-translate-y-px hover:brightness-105 disabled:cursor-not-allowed disabled:opacity-45">Siguiente</button>
            <button type="submit" id="confirmBtn" class="btn btn-primary btn-confirm rounded-[10px] border-0 bg-gradient-to-br from-[#588b8b] to-[#6fa6a6] px-4 py-3 text-[0.95rem] font-bold text-white shadow-[0_8px_20px_rgba(88,139,139,0.35)] transition duration-200 hover:-translate-y-px hover:brightness-105 disabled:cursor-not-allowed disabled:opacity-45" hidden>Confirmar compra</button>
          </div>
        </form>

        <p class="form-status mt-4 min-h-5 text-[#456d75]" id="formStatus" role="status" aria-live="polite"></p>
      </section>

      <aside class="summary order-1 self-start rounded-2xl border border-[rgba(88,139,139,0.2)] bg-[rgba(255,255,255,0.88)] p-4 shadow-[0_14px_34px_rgba(31,54,64,0.1)] min-[840px]:order-2 min-[840px]:sticky min-[840px]:top-[1.3rem]" aria-label="Resumen de compra">
        <h2 class="my-1 tracking-[0.2px]">Resumen</h2>
        <div class="summary-line flex items-center justify-between py-2 text-[#667f89]">
          <span>Subtotal</span>
          <strong>$84.00</strong>
        </div>
        <div class="summary-line flex items-center justify-between py-2 text-[#667f89]">
          <span>Impuestos</span>
          <strong>$16.00</strong>
        </div>
        <div class="summary-total mt-2 flex items-center justify-between border-t border-[rgba(88,139,139,0.2)] pt-3 text-[1.2rem] text-[#1f3640]">
          <span>Total</span>
          <strong>$100.00</strong>
        </div>
      </aside>
    </main>

    <script src="script.js"></script>
  </body>
</html>
